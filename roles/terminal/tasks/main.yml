---
- name: Ensure en_US.UTF-8 locale is generated
  ansible.builtin.lineinfile:
    path: /etc/locale.gen
    regexp: "^#?\\s*en_US.UTF-8 UTF-8"
    line: "en_US.UTF-8 UTF-8"
  register: locale_gen

- name: Generate locales
  ansible.builtin.command:
    cmd: locale-gen
  when: locale_gen.changed
  changed_when: true

- name: Install xfce4-terminal
  ansible.builtin.apt:
    name: xfce4-terminal
    state: present

- name: Set xfce4-terminal as default terminal emulator
  community.general.alternatives:
    name: x-terminal-emulator
    path: /usr/bin/xfce4-terminal

- name: Ensure zsh is the default shell
  ansible.builtin.user:
    name: "{{ username }}"
    shell: /usr/bin/zsh

- name: Deploy custom .zshrc
  ansible.builtin.copy:
    src: .zshrc
    dest: "{{ home_dir }}/.zshrc"
    owner: "{{ username }}"
    mode: "0644"

- name: Create xfce4-terminal config directory
  ansible.builtin.file:
    path: "{{ home_dir }}/.config/xfce4/terminal"
    state: directory
    owner: "{{ username }}"
    mode: "0755"

- name: Deploy xfce4-terminal configuration
  ansible.builtin.template:
    src: terminalrc.j2
    dest: "{{ home_dir }}/.config/xfce4/terminal/terminalrc"
    owner: "{{ username }}"
    mode: "0644"

- name: Create xfce4 keyboard shortcuts config directory
  ansible.builtin.file:
    path: "{{ home_dir }}/.config/xfce4/xfconf/xfce-perchannel-xml"
    state: directory
    owner: "{{ username }}"
    mode: "0755"

- name: Deploy flameshot keyboard shortcut
  ansible.builtin.copy:
    dest: "{{ home_dir }}/.config/xfce4/xfconf/xfce-perchannel-xml/xfce4-keyboard-shortcuts.xml"
    content: |
      <?xml version="1.0" encoding="UTF-8"?>
      <channel name="xfce4-keyboard-shortcuts" version="1.0">
        <property name="commands" type="empty">
          <property name="custom" type="empty">
            <property name="&lt;Super&gt;&lt;Shift&gt;&lt;Ctrl&gt;s" type="string" value="flameshot gui"/>
          </property>
        </property>
      </channel>
    owner: "{{ username }}"
    mode: "0644"
    force: false
