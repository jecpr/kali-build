---
- name: Copy GitHub download script
  ansible.builtin.copy:
    src: githubdownload.py
    dest: /usr/local/bin/githubdownload.py
    mode: "0755"

- name: Create destination directories for releases
  ansible.builtin.file:
    path: "{{ item.dest }}"
    state: directory
    mode: "0755"
  loop: "{{ github_releases }}"

- name: Download GitHub releases
  ansible.builtin.command:
    cmd: >
      /usr/local/bin/githubdownload.py
      {{ item.repo }}
      "{{ item.pattern }}"
      -o {{ item.dest }}
  environment:
    GITHUB_TOKEN: "{{ github_token | default('') }}"
  loop: "{{ github_releases }}"
  changed_when: true
  ignore_errors: true

- name: Clone GitHub repositories
  ansible.builtin.git:
    repo: "{{ item.repo }}"
    dest: "{{ item.dest }}"
    depth: 1
  loop: "{{ github_repos }}"
