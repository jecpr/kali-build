---
# Volatility 3 via pipx
- name: Install Volatility 3 via pipx
  community.general.pipx:
    name: volatility3
    source: "git+https://github.com/volatilityfoundation/volatility3.git"
    state: present
  become: false
  when: install_volatility3

# Volatility 2 (requires Python 2)
- name: Install Volatility 2 system dependencies
  ansible.builtin.apt:
    name:
      - build-essential
      - git
      - libdistorm3-dev
      - yara
      - libraw1394-11
      - libcapstone-dev
      - capstone-tool
      - tzdata
      - python2
      - python2.7-dev
      - libpython2-dev
    state: present
  when: install_volatility2

- name: Check if pip2 is installed
  ansible.builtin.command:
    cmd: python2 -m pip --version
  register: pip2_check
  changed_when: false
  failed_when: false
  when: install_volatility2

- name: Download get-pip.py for Python 2
  ansible.builtin.get_url:
    url: https://bootstrap.pypa.io/pip/2.7/get-pip.py
    dest: /tmp/get-pip2.py
    mode: "0755"
  when: install_volatility2 and pip2_check.rc != 0

- name: Bootstrap pip2
  ansible.builtin.command:
    cmd: python2 /tmp/get-pip2.py
  when: install_volatility2 and pip2_check.rc != 0
  changed_when: true

- name: Install Volatility 2 Python dependencies
  ansible.builtin.command:
    cmd: >
      python2 -m pip install
      distorm3 yara pycrypto pillow openpyxl
      ujson pytz ipython capstone
  when: install_volatility2
  changed_when: true

- name: Clone Volatility 2
  ansible.builtin.git:
    repo: https://github.com/volatilityfoundation/volatility.git
    dest: /opt/volatility2
    depth: 1
  when: install_volatility2

- name: Install Volatility 2
  ansible.builtin.command:
    cmd: python2 -m pip install /opt/volatility2
  when: install_volatility2
  changed_when: true
