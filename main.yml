---
- name: Kali Linux Build
  hosts: localhost
  connection: local
  become: true

  vars_files:
    - group_vars/all.yml

  roles:
    - tools
    - terminal
    - browser
    - system
    - tmux
    - role: gantsign.visual-studio-code
      become: false
      vars:
        users:
          - username: "{{ ansible_user_id }}"
            visual_studio_code_extensions: "{{ vscode_extensions }}"
